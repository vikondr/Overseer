services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: overseer
      POSTGRES_USER: overseer
      POSTGRES_PASSWORD: overseer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overseer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./overseer-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/overseer
      SPRING_DATASOURCE_USERNAME: overseer
      SPRING_DATASOURCE_PASSWORD: overseer
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      OVERSEER_CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:5173}
      STORAGE_TYPE: azure
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OcqFlqUwJPLlmEtlCDXJ1OcqFlqUwJPLlmEtlCDXJ1OcqFlqUwJPLlmEtlCDXJ1==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      AZURE_STORAGE_CONTAINER: overseer-files
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

  frontend:
    build:
      context: ./overseer-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  azurite_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: overseer
      POSTGRES_USER: overseer
      POSTGRES_PASSWORD: overseer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overseer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./overseer-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/overseer
      SPRING_DATASOURCE_USERNAME: overseer
      SPRING_DATASOURCE_PASSWORD: overseer
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

#  frontend:

spring.application.name=overseer-backend

server.port=8080

# ========================================
# Google OAuth2 Configuration
# ========================================
# Replace these with your actual Google OAuth2 credentials from:
# https://console.cloud.google.com/apis/credentials

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# Google OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# ========================================
# CORS Configuration
# ========================================
# Allow your frontend to access the backend
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ========================================
# Security Configuration
# ========================================
app.security.disable=false

# ========================================
# Frontend URL (leave empty to return token as JSON after OAuth2 login)
# ========================================
overseer.frontend-url=${FRONTEND_URL:}

# ========================================
# JWT Configuration
# ========================================
overseer.jwt.secret=${JWT_SECRET}
overseer.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ========================================
# Database Configuration
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:overseer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=DEBUG

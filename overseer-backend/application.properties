# ═══════════════════════════════════════════════════════════════
# OVERSEER — Application Configuration
# ═══════════════════════════════════════════════════════════════

server.port=8080
spring.application.name=overseer

# ── Database (PostgreSQL for prod, H2 for dev) ──────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/overseer
spring.datasource.username=${DB_USERNAME:overseer}
spring.datasource.password=${DB_PASSWORD:overseer}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── H2 dev profile (activate with --spring.profiles.active=dev) ──
# spring.datasource.url=jdbc:h2:mem:overseer
# spring.datasource.driver-class-name=org.h2.Driver
# spring.h2.console.enabled=true

# ── OAuth2 — Google ─────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ── OAuth2 — GitHub ──────────────────────────────────────────
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# ── JWT ──────────────────────────────────────────────────────
overseer.jwt.secret=${JWT_SECRET:overseer-dev-secret-change-this-in-production-please}
overseer.jwt.expiration-ms=86400000

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ── S3 / Blob Storage ───────────────────────────────────────
overseer.storage.type=${STORAGE_TYPE:local}
overseer.storage.local-path=./uploads
overseer.storage.s3.bucket=${S3_BUCKET:overseer-files}
overseer.storage.s3.region=${S3_REGION:us-east-1}

# ── CORS ─────────────────────────────────────────────────────
overseer.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── OpenAPI / Swagger ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

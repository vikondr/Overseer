name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: overseer-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: overseer-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ── Backend ─────────────────────────────────────────────────
  backend:
    name: Backend — compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: overseer-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      # Skip tests — the only test (contextLoads) requires a live PostgreSQL instance
      - run: chmod +x mvnw
      - run: ./mvnw --batch-mode package -DskipTests

  # ── Pixel Diff ──────────────────────────────────────────────
  pixeldiff:
    name: Pixel Diff — install & check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: overseer-pixeldiff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: overseer-pixeldiff/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py